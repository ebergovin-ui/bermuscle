<div class="input-group">
            <label>Strain epsilon ε (%)</label>
            <input type="number" id="p_eps" value="10">
        </div>
        <button onclick="calcPressure()">CALCULATE PRESSURE</button>
        <div id="p_warn_eps" class="warning">Your air muscle is not capable of contracting like that (the epsilon will be smaller)</div>
        <div id="p_warn_safety" class="warning">Check the parameters of your cable sheath, it may not withstand!</div>
        <div class="result">
            <span class="unit">Required Pressure:</span>
            <span class="force-val" id="res_pressure">0.00</span>
            <span class="unit">MegaPascals (MPa)</span>
        </div>
    </div>

    <script>
        const g = 9.81;

        function calcForce() {
            const r0 = parseFloat(document.getElementById('f_r0').value) / 1000;
            const a0 = parseFloat(document.getElementById('f_alpha').value) * Math.PI / 180;
            const p = parseFloat(document.getElementById('f_p').value) * 1000000;
            const p0 = parseFloat(document.getElementById('f_p0').value) * 1000000;
            const eps_val = parseFloat(document.getElementById('f_eps').value);
            
            // Check epsilon limit
            document.getElementById('f_warn_eps').style.display = eps_val > 50 ? 'block' : 'none';
            const eps = eps_val / 100;

            const term1 = 3 / Math.pow(Math.tan(a0), 2);
            const term2 = Math.pow((1 - eps), 2);
            const term3 = 1 / Math.pow(Math.sin(a0), 2);

            const force = Math.PI * Math.pow(r0, 2) * (p - p0) * (term1 * term2 - term3);
            document.getElementById('res_force').innerText = force > 0 ? force.toFixed(2) : "0.00";
        }

        function calcPressure() {
            const r0 = parseFloat(document.getElementById('p_r0').value) / 1000;
            const a0 = parseFloat(document.getElementById('p_alpha').value) * Math.PI / 180;
            const mass = parseFloat(document.getElementById('p_mass').value);
            const p0_mpa = parseFloat(document.getElementById('p_p0').value);
            const p0 = p0_mpa * 1000000;
            const eps_val = parseFloat(document.getElementById('p_eps').value);

            // Check epsilon limit
            document.getElementById('p_warn_eps').style.display = eps_val > 50 ? 'block' : 'none';
            const eps = eps_val / 100;

            const F = mass * g;
            const term1 = 3 / Math.pow(Math.tan(a0), 2);
            const term2 = Math.pow((1 - eps), 2);
            const term3 = 1 / Math.pow(Math.sin(a0), 2);

            // Обратный расчет давления: P = F / (pi * r0^2 * (geom_terms)) + P0
            const geom = (term1 * term2 - term3);
            const p_req_pa = F / (Math.PI * Math.pow(r0, 2) * geom) + p0;
            const p_req_mpa = p_req_pa / 1000000;

            // Check pressure safety
            document.getElementById('p_warn_safety').style.display = p_req_mpa > 0.3 ? 'block' : 'none';

            document.getElementById('res_pressure').innerText = p_req_mpa > 0 ? p_req_mpa.toFixed(3) : "Error";
        }
    </script>
</body>
</html>
