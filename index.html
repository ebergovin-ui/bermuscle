<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BerMuscle - Калькулятор силы</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 450px; border: 1px solid #334155; }
        h1 { color: #38bdf8; text-align: center; margin-bottom: 25px; font-size: 24px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #94a3b8; }
        input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; font-size: 15px; outline: none; transition: 0.3s; }
        input:focus { border-color: #38bdf8; }
        button { width: 100%; padding: 14px; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #0ea5e9; transform: translateY(-2px); }
        .result { margin-top: 25px; padding: 20px; background: #334155; border-radius: 10px; text-align: center; border: 1px solid #38bdf8; display: none; }
        .force-val { font-size: 32px; font-weight: bold; color: #38bdf8; display: block; }
        .unit { font-size: 14px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="card">
    <h1>BerMuscle Calc</h1>
    
    <div class="input-group">
        <label>Длина мускула L0 (м)</label>
        <input type="number" id="l0" value="0.27" step="0.01">
    </div>
    <div class="input-group">
        <label>Радиус r0 (м)</label>
        <input type="number" id="r0" value="0.0079" step="0.0001">
    </div>
    <div class="input-group">
        <label>Угол нитей (градусы)</label>
        <input type="number" id="alpha" value="23">
    </div>
    <div class="input-group">
        <label>Давление в системе P (Па)</label>
        <input type="number" id="p_total" value="280000">
    </div>
    <div class="input-group">
        <label>Давление раздутия P0 (Па)</label>
        <input type="number" id="p0" value="31000">
    </div>
    <div class="input-group">
        <label>Деформация ε (например 0.31)</label>
        <input type="number" id="eps" value="0.31" step="0.01">
    </div>

    <button onclick="calculate()">ВЫЧИСЛИТЬ СИЛУ</button>

    <div class="result" id="resultBlock">
        <span class="unit">Теоретическая сила тяги:</span>
        <span class="force-val" id="forceResult">0</span>
        <span class="unit">Ньютонов (Н)</span>
    </div>
</div>

<script>
    function calculate() {
        const r0 = parseFloat(document.getElementById('r0').value);
        const alphaDeg = parseFloat(document.getElementById('alpha').value);
        const pTotal = parseFloat(document.getElementById('p_total').value);
        const p0 = parseFloat(document.getElementById('p0').value);
        const eps = parseFloat(document.getElementById('eps').value);

        const alphaRad = alphaDeg * Math.PI / 180;
        const a = 3 / Math.pow(Math.tan(alphaRad), 2);
        const b = 1 / Math.pow(Math.sin(alphaRad), 2);
        const pEff = pTotal - p0;

        // Формула Тонду-Лопеса
        const force = Math.PI * Math.pow(r0, 2) * pEff * (a * Math.pow((1 - eps), 2) - b);

        document.getElementById('forceResult').innerText = force.toFixed(2);
        document.getElementById('resultBlock').style.display = 'block';
    }
</script>

</body>
</html>
