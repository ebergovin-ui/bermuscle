<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BerMuscle Engineering Hub</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 450px; border: 1px solid #334155; margin-bottom: 30px; }
        h1 { color: #38bdf8; text-align: center; margin-bottom: 25px; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; }
        h2 { color: #94a3b8; font-size: 18px; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #94a3b8; }
        input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; font-size: 15px; outline: none; }
        input:focus { border-color: #38bdf8; }
        button { width: 100%; padding: 14px; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 15px; }
        .result { margin-top: 20px; padding: 15px; background: #334155; border-radius: 10px; text-align: center; border: 1px solid #38bdf8; }
        .warning { color: #fb7185; font-size: 13px; margin-top: 10px; font-weight: bold; display: none; }
        .force-val { font-size: 28px; font-weight: bold; color: #38bdf8; display: block; }
        .unit { font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>

    <h1>BerMuscle Engineering Hub</h1>

    <div class="card">
        <h2>FORCE CALCULATION</h2>
        <div class="input-group">
            <label>Initial Radius r0 (mm)</label>
            <input type="number" id="f_r0" value="5.5">
        </div>
        <div class="input-group">
            <label>Initial Angle alpha0 (degrees)</label>
            <input type="number" id="f_alpha" value="27">
        </div>
        <div class="input-group">
            <label>Working Pressure P (MPa)</label>
            <input type="number" id="f_p" value="0.2">
        </div>
        <div class="input-group">
            <label>Starting inflation pressure P0 (MPa)</label>
            <input type="number" id="f_p0" value="0.11">
        </div>
        <div class="input-group">
            <label>Strain epsilon ε (%)</label>
            <input type="number" id="f_eps" value="10">
        </div>
        <button onclick="calcForce()">CALCULATE FORCE</button>
        <div id="f_warn_eps" class="warning">Your air muscle is not capable of contracting like that (the epsilon will be smaller)</div>
        <div class="result">
            <span class="unit">Resulting Force:</span>
            <span class="force-val" id="res_force">0.00</span>
            <span class="unit">Newtons (N)</span>
        </div>
    </div>

    <div class="card">
        <h2>PRESSURE CALCULATION</h2>
        <div class="input-group">
            <label>Initial Radius r0 (mm)</label>
            <input type="number" id="p_r0" value="5.5">
        </div>
        <div class="input-group">
            <label>Initial Angle alpha0 (degrees)</label>
            <input type="number" id="p_alpha" value="27">
        </div>
        <div class="input-group">
            <label>Load Mass (kg)</label>
            <input type="number" id="p_mass" value="5">
        </div>
        <div class="input-group">
            <label>Starting inflation pressure P0 (MPa)</label>
            <input type="number" id="p_p0" value="0.11">
        </div>
